@if (totalPages() > 1) {
  <div class="pagination">
    <button class="secondary" [disabled]="!hasPreviousPage()" (click)="pageChange.emit(page() - 1)">Previous</button>
    <span>Page {{ page() }} of {{ totalPages() }}</span>
    <button class="secondary" [disabled]="!hasNextPage()" (click)="pageChange.emit(page() + 1)">Next</button>
  </div>
}
